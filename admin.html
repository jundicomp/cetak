<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CETAK.ID — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;
  --card:#FAFAFA;
  --ink:#141414;
  --ink-soft:#4D4D4D;
  --line:#EBEBEB;
  --orange:#FF6A00;
  --orange-dark:#E05F00;
  --orange-soft:#FFEDDD;
  --slate:#44474D;
  --slate-soft:#F0F1F3;
  --green:#1F8A4C;
  --green-soft:#E8F7EE;
  --red:#D92D20;
  --red-soft:#FBEAE8;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 4px 18px rgba(0,0,0,.07);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none !important;}
input,select,textarea{font-family:inherit;}

/* ===== layout ===== */
.app{display:flex;min-height:100vh;}

/* sidebar */
.sidebar{
  width:246px;flex-shrink:0;background:var(--ink);color:#EFEBE0;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;
  transition:transform .25s;
}
.sb-brand{padding:22px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-mark{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:15px;flex-shrink:0;}
.sb-brand-text{font-family:'Fraunces',serif;font-weight:600;font-size:16px;line-height:1.2;}
.sb-brand-text small{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;opacity:.55;text-transform:uppercase;font-weight:400;margin-top:2px;}
.sb-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;opacity:.55;padding:14px 10px 6px;}
.sb-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-sm);
  background:none;border:none;color:#EFEBE0;font-size:14px;text-align:left;width:100%;opacity:.85;transition:.15s;
}
.sb-item svg{flex-shrink:0;width:17px;height:17px;}
.sb-item:hover{background:rgba(255,255,255,.06);opacity:1;}
.sb-item.active{background:var(--orange);opacity:1;font-weight:600;}
.sb-foot{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.sb-foot-text{font-size:13px;line-height:1.4;}
.sb-foot-text small{display:block;opacity:.65;font-size:11.5px;}

.sb-close{display:none;}

/* main */
.main{margin-left:246px;flex:1;min-width:0;}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.topbar h1{margin:0;font-size:21px;font-weight:600;}
.topbar .sub{font-size:13px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.syncbar{
  background:var(--card);border-bottom:1px solid var(--line);padding:9px 32px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.hamburger{display:none;background:none;border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px;}
.page{padding:28px 32px 60px;max-width:1220px;}

/* ===== reusable components ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
.card + .card{margin-top:18px;}
.card h3{margin:0 0 18px;font-size:15.5px;display:flex;align-items:center;gap:9px;font-family:'Inter',sans-serif;font-weight:600;}
.card h3 .tag{background:var(--ink);color:var(--bg);font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:3px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.stat-card .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;}
.stat-card .val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;}
.stat-card.pos .val{color:var(--green);}
.stat-card.neg .val{color:var(--red);}
.stat-card .delta{font-size:12.5px;color:var(--ink-soft);margin-top:4px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
.field{margin-bottom:14px;}
.field.full{grid-column:1/-1;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink);}
.field .hint{font-size:12.5px;color:var(--ink-soft);margin-top:5px;}
.hint{font-size:13.5px;color:var(--ink-soft);line-height:1.6;}
.field input, .field select, .field textarea{
  width:100%;border:1px solid var(--line);background:var(--bg);padding:10px 13px;
  border-radius:var(--radius-sm);font-size:14px;color:var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--orange);}
.field textarea{resize:vertical;min-height:70px;}
.field-radio-row{display:flex;gap:10px;flex-wrap:wrap;}
.field-radio{border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 14px;font-size:13.5px;cursor:pointer;background:var(--bg);}
.field-radio input{margin-right:6px;}

.btn{
  padding:11px 22px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;gap:8px;transition:.15s;
}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:var(--orange);}
.btn-outline{background:var(--bg);color:var(--ink);border:1.5px solid var(--line);}
.btn-outline:hover{border-color:var(--ink);}
.wa-btn{border-color:#25D366 !important;color:#1B8A4C !important;}
.wa-btn:hover{background:#25D366 !important;color:#fff !important;border-color:#25D366 !important;}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;}
.btn-danger-text{background:none;border:none;color:var(--red);font-size:13px;font-family:'JetBrains Mono',monospace;text-decoration:underline;padding:4px;}

table{width:100%;border-collapse:collapse;}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--line);}
table th{
  text-align:left;background:var(--card);font-family:'JetBrains Mono',monospace;font-size:11.5px;
  text-transform:uppercase;letter-spacing:.05em;color:var(--ink);font-weight:700;padding:12px 14px;white-space:nowrap;border-bottom:1px solid var(--line);
}
table td{padding:13px 14px;font-size:14px;color:var(--ink);border-bottom:1px solid var(--line);white-space:nowrap;}
table tbody tr:last-child td{border-bottom:none;}
table tbody tr:nth-child(even){background:#FAFAFA;}
table tbody tr:hover{background:var(--orange-soft);}
table td.amt{font-family:'JetBrains Mono',monospace;text-align:right;}
th.amt{text-align:right;}
.pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.03em;}
.pill.blue{background:var(--slate-soft);color:var(--slate);}
.pill.red{background:var(--red-soft);color:var(--red);}
.pill.orange{background:var(--orange-soft);color:var(--orange-dark);}
.pill.green{background:var(--green-soft);color:var(--green);}
.pill.gray{background:#F0F0F0;color:var(--ink-soft);}
.empty-row td{text-align:center;color:var(--ink-soft);padding:36px;font-size:14px;}

.tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line);}
.tab-btn{background:none;border:none;padding:10px 18px;font-size:14px;font-weight:500;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--ink);border-color:var(--orange);font-weight:600;}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar-filters{display:flex;gap:10px;flex-wrap:wrap;}
.toolbar-filters select, .toolbar-filters input{border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 12px;font-size:12.5px;background:var(--bg);}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:var(--radius-sm);
  font-size:13px;z-index:100;opacity:0;pointer-events:none;transition:.25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.overlay-mobile{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;opacity:0;pointer-events:none;transition:.2s;}
.overlay-mobile.show{opacity:1;pointer-events:auto;}

.prod-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.prod-name-cell{display:flex;align-items:center;gap:10px;}

.footrow td{font-weight:700;background:var(--card);}

/* ===== floating modal (add/edit product, etc.) ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(28,27,25,.5);z-index:90;
  display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;
}
.modal-box{
  background:var(--bg);border-radius:var(--radius);max-width:640px;width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.28);animation:modalIn .18s ease-out;
}
@keyframes modalIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-box-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-box-head h3{margin:0;font-size:16px;}
.modal-box-close{background:none;border:none;font-size:20px;color:var(--ink-soft);width:30px;height:30px;border-radius:50%;}
.modal-box-close:hover{background:var(--card);}
.modal-box-body{padding:22px 24px;max-height:70vh;overflow-y:auto;}
.modal-box-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}

.img-upload{
  border:1.5px dashed var(--line);border-radius:var(--radius-sm);padding:16px;
  display:flex;align-items:center;gap:14px;
}
.img-upload-preview{
  width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--card);
  border:1px solid var(--line);flex-shrink:0;
}
.img-upload-controls{flex:1;min-width:0;}
.img-upload-controls input[type=file]{font-size:13px;}
.img-upload-controls .or{font-size:12.5px;color:var(--ink-soft);margin:8px 0 4px;}

.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px dashed var(--line);}
.toggle-row:last-child{border-bottom:none;}
.switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch-track{position:absolute;inset:0;background:var(--line);border-radius:100px;transition:.15s;cursor:pointer;}
.switch-track::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
.switch input:checked + .switch-track{background:var(--green);}
.switch input:checked + .switch-track::before{transform:translateX(18px);}

.fab{
  position:fixed;bottom:28px;right:28px;z-index:20;background:var(--ink);color:#fff;
  border:none;border-radius:100px;padding:13px 22px;font-size:13.5px;font-weight:600;
  display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(28,27,25,.25);
}
.fab:hover{background:var(--orange);}

/* ===== generic DataTable: search + sort + pagination + export ===== */
.dt-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.dt-search{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:9px 13px;background:var(--bg);flex:1;min-width:180px;max-width:320px;
}
.dt-search svg{flex-shrink:0;opacity:.5;}
.dt-search input{border:none;outline:none;background:transparent;font-size:14px;width:100%;font-family:inherit;color:var(--ink);}
.dt-actions{display:flex;gap:8px;flex-shrink:0;}
.dt-icon-btn{
  width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--bg);
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.dt-icon-btn:hover{border-color:var(--orange);background:var(--orange-soft);}
.dt-icon-btn svg{width:16px;height:16px;}

table thead th.dt-th-sort{cursor:pointer;user-select:none;}
table thead th.dt-th-sort:hover{color:var(--ink);}
.dt-sort-arrow{margin-left:4px;font-size:9px;}
/* orange table headers with contrasting dark text */
.table-wrap table th{
  background:var(--orange);color:#1A1200;font-weight:700;letter-spacing:.03em;
}

.dt-pagination{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;}
.dt-pageinfo{font-size:12.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}
.dt-pagebtns{display:flex;align-items:center;gap:10px;}
.dt-pagebtns button{
  background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:7px 13px;font-size:13px;font-weight:600;
}
.dt-pagebtns button:hover:not(:disabled){border-color:var(--orange);color:var(--orange);}
.dt-pagebtns button:disabled{opacity:.35;}
.dt-pagenum{font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--ink-soft);}

/* ===== responsive ===== */
@media (max-width:980px){
  .stat-grid{grid-template-columns:1fr 1fr;}
  .form-grid, .form-grid.cols-3{grid-template-columns:1fr;}
}
@media (max-width:900px){
  .sidebar{transform:translateX(-100%);width:260px;}
  .sidebar.show{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.25);}
  .main{margin-left:0;}
  .hamburger{display:flex;}
  .sb-close{display:block;background:none;border:none;color:#EFEBE0;font-size:20px;margin-left:auto;}
  .sb-brand{justify-content:space-between;}
}
@media (max-width:560px){
  .stat-grid{grid-template-columns:1fr 1fr;}
  .page{padding:20px 16px 50px;}
  .topbar{padding:14px 16px;}
  .syncbar{padding:8px 16px;}
  .card{padding:16px;}
}
</style>
</head>
<body>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="sb-mark" id="sbMark">C</div>
        <div class="sb-brand-text" id="sbBrandText">CETAK.ID<small>Admin Panel</small></div>
      </div>
      <button class="sb-close" onclick="toggleSidebar(false)">×</button>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div class="sb-avatar">AD</div>
      <div class="sb-foot-text">Admin Toko<small>admin@cetak.id</small></div>
    </div>
  </aside>
  <div class="overlay-mobile" id="mobileOverlay" onclick="toggleSidebar(false)"></div>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" onclick="toggleSidebar(true)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="sub" id="pageSub">Ringkasan performa toko</div>
        </div>
      </div>
    </div>
    <div class="syncbar">
      <span id="syncStatus" class="pill gray" style="white-space:nowrap"></span>
      <button class="btn btn-outline btn-sm" onclick="refreshCurrent()">⟳ Segarkan</button>
    </div>
    <div class="page" id="pageContent"></div>
  </div>

</div>

<div id="modalContainer"></div>
<div id="invoiceCaptureArea" style="position:fixed;left:0;top:0;z-index:-1;pointer-events:none;overflow:hidden;"></div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA / STATE
   ============================================================ */
const CATEGORIES = ["Kartu Nama","Brosur & Flyer","Banner & Spanduk","Stiker","Undangan","Nota & Faktur","Kalender","Stempel"];
const UNITS = ["pcs","lembar","box","meter","buku","set"];
const EXPENSE_CATS = ["Gaji Karyawan","Listrik & Air","Sewa Tempat","Transportasi","Marketing","Maintenance Mesin","Internet & Telepon","Lain-lain"];

let uid = 1000;
const nextId = () => uid++;
const today = () => new Date().toISOString().slice(0,10);
const rupiah = n => "Rp" + Math.round(n||0).toLocaleString("id-ID");
const fmtDate = d => new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}

/* ---- Google Sheets backend (via Apps Script Web App) — this is the single
   source of truth shared by both the admin panel and the storefront page. ---- */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwWGgMqGHvCfIwK2gQzSG1KA3NH9p5uEXZ9DLGcPs23OCyHTEHB5qslYrFvoU_Y0q4--Q/exec';
const hasStorage = true;
const KEYS = { products:'products', orders:'orders', sales:'sales', purchases:'purchases', expenses:'expenses', bankaccounts:'bankaccounts', settings:'settings', customers:'customers', jobs:'jobs' };

const FALLBACK_PRODUCTS = [
  {id:nextId(),name:"Kartu Nama Premium Art Carton 260gsm",cat:"Kartu Nama",price:45000,cost:27000,unit:"box",stock:84,seed:"biz1",desc:"Kartu nama full color dua sisi, art carton 260gsm."},
  {id:nextId(),name:"Banner Outdoor Flexi Korea",cat:"Banner & Spanduk",price:25000,cost:14000,unit:"meter",stock:410,seed:"banner1",desc:"Bahan flexi korea 280gr tahan cuaca."},
  {id:nextId(),name:"Stiker Vinyl Custom Bentuk Bebas",cat:"Stiker",price:15000,cost:7500,unit:"lembar",seed:"stick1",stock:150,desc:"Stiker vinyl cutting sesuai bentuk desain."},
  {id:nextId(),name:"Undangan Pernikahan Softcover",cat:"Undangan",price:3500,cost:2100,unit:"pcs",seed:"invite1",stock:620,desc:"Undangan pernikahan elegan sampul lembut."},
  {id:nextId(),name:"Nota / Faktur Rangkap 2 NCR",cat:"Nota & Faktur",price:65000,cost:41000,unit:"box",seed:"note1",stock:22,desc:"Nota rangkap 2 kertas NCR."},
  {id:nextId(),name:"Brosur A5 Full Color 2 Sisi",cat:"Brosur & Flyer",price:350000,cost:230000,unit:"box",seed:"broch1",stock:9,desc:"Brosur promosi A5, art paper 150gsm."},
];
const FALLBACK_SALES = [
  {id:nextId(),date:daysAgo(1),productId:FALLBACK_PRODUCTS[0].id,qty:5,price:45000,buyer:"Toko Sinar Jaya"},
  {id:nextId(),date:daysAgo(2),productId:FALLBACK_PRODUCTS[1].id,qty:12,price:25000,buyer:"Warung Bu Rina"},
  {id:nextId(),date:daysAgo(2),productId:FALLBACK_PRODUCTS[3].id,qty:200,price:3500,buyer:"Keluarga Santoso"},
  {id:nextId(),date:daysAgo(4),productId:FALLBACK_PRODUCTS[2].id,qty:8,price:15000,buyer:"CV Maju Bersama"},
  {id:nextId(),date:daysAgo(5),productId:FALLBACK_PRODUCTS[0].id,qty:3,price:45000,buyer:"PT Nusantara Prima"},
  {id:nextId(),date:daysAgo(6),productId:FALLBACK_PRODUCTS[4].id,qty:2,price:65000,buyer:"Toko Ridho"},
  {id:nextId(),date:daysAgo(8),productId:FALLBACK_PRODUCTS[5].id,qty:1,price:350000,buyer:"Yayasan Cerdas"},
  {id:nextId(),date:daysAgo(9),productId:FALLBACK_PRODUCTS[1].id,qty:20,price:25000,buyer:"Event Organizer Kita"},
  {id:nextId(),date:daysAgo(12),productId:FALLBACK_PRODUCTS[2].id,qty:15,price:15000,buyer:"Toko Sinar Jaya"},
  {id:nextId(),date:daysAgo(14),productId:FALLBACK_PRODUCTS[3].id,qty:100,price:3500,buyer:"Bu Fitri"},
];
const FALLBACK_PURCHASES = [

/* GET {sheet} from the Google Sheet via Apps Script */
/* ---- lazy-load heavy libraries only when actually needed (export/WA/PDF
   buttons), instead of blocking every page load with them ---- */
const _loadedScripts = {};
function ensureScript(src){
  if(_loadedScripts[src]) return _loadedScripts[src];
  _loadedScripts[src] = new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=()=>resolve(); s.onerror=()=>reject(new Error('Gagal memuat '+src));
    document.head.appendChild(s);
  });
  return _loadedScripts[src];
}
async function ensureXLSX(){
  if(typeof XLSX==='undefined') await ensureScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
}
async function ensureJsPDF(){
  if(typeof window.jspdf==='undefined') await ensureScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  await ensureScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
}
async function ensureHtml2Canvas(){
  if(typeof html2canvas==='undefined') await ensureScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
}

async function storageGetSafe(sheetKey){
  try{
    const res = await fetch(`${GAS_URL}?sheet=${sheetKey}`);
    const json = await res.json();
    return json.ok ? json.data : null;
  }catch(e){ console.error(e); return null; }
}
/* POST — overwrite the whole tab with `data` */
async function saveKey(sheetKey, data){
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids a CORS preflight
      body: JSON.stringify({sheet:sheetKey, data}),
    });
    const json = await res.json();
    if(!json.ok) showToast('Gagal menyimpan ke Google Sheets: '+(json.error||''));
  }catch(e){ showToast('Gagal terhubung ke Google Sheets'); console.error(e); }
}
/* race-safe: appends rows without reading/rewriting the whole sheet — used when
   only adding new rows, so a concurrent storefront checkout can't get wiped out
   by an admin save happening at nearly the same moment (or vice versa). */
async function appendKey(sheetKey, rows){
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({sheet:sheetKey, action:'append', rows}),
    });
    const json = await res.json();
    if(!json.ok) showToast('Gagal menyimpan ke Google Sheets: '+(json.error||''));
  }catch(e){ showToast('Gagal terhubung ke Google Sheets'); console.error(e); }
}
/* one round-trip instead of 8 — much faster, since each Apps Script call
   has its own cold-start/latency cost. Falls back automatically to the old
   per-sheet calls if an older Code.gs is still deployed (no ?sheet=all support). */
async function storageGetAllSafe(){
  try{
    const res = await fetch(`${GAS_URL}?sheet=all`);
    const json = await res.json();
    return (json.ok && json.data && typeof json.data==='object') ? json.data : null;
  }catch(e){ console.error(e); return null; }
}
async function loadAll(){
  const bundle = await storageGetAllSafe();
  let pr, or, sl, pu, ex, ba, st, cu, jb;
  if(bundle){
    ({products:pr, orders:or, sales:sl, purchases:pu, expenses:ex, bankaccounts:ba, settings:st, customers:cu, jobs:jb} = bundle);
  } else {
    [pr, or, sl, pu, ex, ba, st, cu, jb] = await Promise.all([
      storageGetSafe(KEYS.products), storageGetSafe(KEYS.orders), storageGetSafe(KEYS.sales),
      storageGetSafe(KEYS.purchases), storageGetSafe(KEYS.expenses),
      storageGetSafe(KEYS.bankaccounts), storageGetSafe(KEYS.settings), storageGetSafe(KEYS.customers),
      storageGetSafe(KEYS.jobs),
    ]);
  }
  const offline = pr===null && sl===null && pu===null && ex===null;
  products = pr || FALLBACK_PRODUCTS;
  orders = or || [];
  sales = sl || FALLBACK_SALES;
  purchases = pu || FALLBACK_PURCHASES;
  expenses = ex || FALLBACK_EXPENSES;
  bankAccounts = (ba || FALLBACK_BANK_ACCOUNTS).map(b=>({...b, active: b.active===true||b.active==='true'||b.active==='TRUE'}));
  settings = st || FALLBACK_SETTINGS;
  customers = cu || FALLBACK_CUSTOMERS;
  jobs = jb || FALLBACK_JOBS;
  if(offline && (!pr)){
    // Google Sheet belum terisi / URL belum benar → tetap jalan dengan data contoh lokal
    await Promise.allSettled([
      saveKey(KEYS.products, products), saveKey(KEYS.sales, sales),
      saveKey(KEYS.purchases, purchases), saveKey(KEYS.expenses, expenses),
      saveKey(KEYS.bankaccounts, bankAccounts), saveKey(KEYS.settings, settings),
      saveKey(KEYS.customers, customers), saveKey(KEYS.jobs, jobs),
    ]);
  }
  const allIds=[...products,...sales,...purchases,...expenses,...bankAccounts,...customers].map(x=>x.id||0);
  const maxId=allIds.length?Math.max(...allIds):0;
  if(maxId>=uid) uid=maxId+1;
  const el=document.getElementById('syncStatus');
  if(el) el.innerHTML = offline ? '🟠 Gagal konek Sheets (cek URL)' : '🟢 Tersambung ke Google Sheets';
  applyAdminBranding();
}

/* ============================================================
   COMPUTED HELPERS
   ============================================================ */
function productById(id){return products.find(p=>p.id==id);}
function totalSalesRevenue(){return sales.reduce((s,x)=>s+x.qty*x.price,0);}
function totalHPP(){return sales.reduce((s,x)=>{const p=productById(x.productId);return s+(p?p.cost*x.qty:0);},0);}
function totalPurchases(){return purchases.reduce((s,x)=>s+x.qty*x.price,0);}
function totalExpenses(){return expenses.reduce((s,x)=>s+x.amount,0);}
function perProductReport(){
  return products.map(p=>{
    const pSales = sales.filter(s=>s.productId==p.id);
    const qty = pSales.reduce((s,x)=>s+x.qty,0);
    const revenue = pSales.reduce((s,x)=>s+x.qty*x.price,0);
    const hpp = qty*p.cost;
    const laba = revenue-hpp;
    const margin = revenue>0 ? (laba/revenue*100) : 0;
    return {p,qty,revenue,hpp,laba,margin};
  }).sort((a,b)=>b.laba-a.laba);
}

window.__dt = window.__dt || {};
function renderDataTable(opts){
  const { containerId, columns, data, pageSize=8, filename='data', title } = opts;
  window.__dt[containerId] = { search:'', sortKey:opts.defaultSort||null, sortDir:1, page:1, columns, dataRef:()=>data, pageSize, filename, title:title||filename };
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <div class="dt-toolbar">
      <div class="dt-search">${ICON_SEARCH}<input type="text" id="${containerId}__search" placeholder="Cari..."></div>
      <div class="dt-actions">
        <button class="dt-icon-btn" title="Export ke Excel" onclick="dtExportExcel('${containerId}')">${ICON_XLSX}</button>
        <button class="dt-icon-btn" title="Export ke PDF" onclick="dtExportPDF('${containerId}')">${ICON_PDF}</button>
      </div>
    </div>
    <div id="${containerId}__body"></div>
  `;
  document.getElementById(`${containerId}__search`).addEventListener('input', e=>{
    window.__dt[containerId].search = e.target.value;
    window.__dt[containerId].page = 1;
    dtUpdateBody(containerId);
  });
  dtUpdateBody(containerId);
}
function dtFilterSort(containerId){
  const s = window.__dt[containerId];
  let rows = s.dataRef();
  if(s.search){
    const q = s.search.toLowerCase();
    rows = rows.filter(r => s.columns.some(c => String(c.searchValue?c.searchValue(r):(r[c.key]??'')).toLowerCase().includes(q)));
  }
  if(s.sortKey){
    rows = [...rows].sort((a,b)=>{
      let va=a[s.sortKey], vb=b[s.sortKey];
      if(typeof va==='number' && typeof vb==='number') return (va-vb)*s.sortDir;
      return String(va??'').localeCompare(String(vb??''),'id')*s.sortDir;
    });
  }
  return rows;
}
function dtUpdateBody(containerId){
  const s = window.__dt[containerId];
  const rows = dtFilterSort(containerId);
  const pageSize = s.pageSize;
  const totalPages = Math.max(1, Math.ceil(rows.length/pageSize));
  if(s.page>totalPages) s.page=totalPages;
  const start=(s.page-1)*pageSize;
  const pageRows = rows.slice(start, start+pageSize);
  document.getElementById(`${containerId}__body`).innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>${s.columns.map(c=>`
        <th class="${c.align==='right'?'amt':''} ${c.sortable!==false?'dt-th-sort':''}" ${c.sortable!==false?`onclick="dtSort('${containerId}','${c.key}')"`:''}>
          ${c.label}${s.sortKey===c.key?`<span class="dt-sort-arrow">${s.sortDir===1?'▲':'▼'}</span>`:''}
        </th>`).join('')}</tr></thead>
      <tbody>${pageRows.length ? pageRows.map(r=>`<tr>${s.columns.map(c=>`<td class="${c.align==='right'?'amt':''}">${c.render?c.render(r):(r[c.key]??'-')}</td>`).join('')}</tr>`).join('') : `<tr class="empty-row"><td colspan="${s.columns.length}">Tidak ada data.</td></tr>`}</tbody>
    </table></div>
    <div class="dt-pagination">
      <span class="dt-pageinfo">${rows.length?`${start+1}–${Math.min(start+pageSize,rows.length)} dari ${rows.length} data`:'0 data'}</span>
      <div class="dt-pagebtns">
        <button ${s.page<=1?'disabled':''} onclick="dtPage('${containerId}',${s.page-1})">‹ Sebelumnya</button>
        <span class="dt-pagenum">Hal ${s.page}/${totalPages}</span>
        <button ${s.page>=totalPages?'disabled':''} onclick="dtPage('${containerId}',${s.page+1})">Berikutnya ›</button>
      </div>
    </div>`;
}
function dtSort(containerId, key){
  const s=window.__dt[containerId];
  if(s.sortKey===key) s.sortDir*=-1; else { s.sortKey=key; s.sortDir=1; }
  dtUpdateBody(containerId);
}
function dtPage(containerId, p){ window.__dt[containerId].page=p; dtUpdateBody(containerId); }
async function dtExportExcel(containerId){
  await ensureXLSX();
  const s=window.__dt[containerId];
  const rows=dtFilterSort(containerId);
  const cols=s.columns.filter(c=>!c.exportSkip);
  const data=rows.map(r=>{ const o={}; cols.forEach(c=>o[c.label]=c.exportValue?c.exportValue(r):(r[c.key]??'')); return o; });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, `${s.filename}.xlsx`);
  showToast('Excel diunduh');
}
async function dtExportPDF(containerId){
  await ensureJsPDF();
  const s=window.__dt[containerId];
  const rows=dtFilterSort(containerId);
  const cols=s.columns.filter(c=>!c.exportSkip);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(13);
  doc.text(s.title, 14, 15);
  doc.autoTable({
    startY:22,
    head:[cols.map(c=>c.label)],
    body: rows.map(r=>cols.map(c=>String(c.exportValue?c.exportValue(r):(r[c.key]??'')))),
    styles:{fontSize:8, cellPadding:3},
    headStyles:{fillColor:[255,106,0], textColor:[20,20,20], fontStyle:'bold'},
    margin:{left:14,right:14},
  });
  doc.save(`${s.filename}.pdf`);
  showToast('PDF diunduh');
}

      <div class="modal-box">

}
function closeGenericModal(){
  document.getElementById('modalContainer').innerHTML='';
}
/* resize + compress an uploaded image file into a small base64 data URL
   (keeps Google Sheets cell size sane — cells cap out around 50k chars) */
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function handleImageInput(fileInputId, previewId, hiddenFieldId){
  const file = document.getElementById(fileInputId).files[0];
  if(!file) return;
  showToast('Memproses gambar...');
  let quality=0.72, dataUrl=await compressImageFile(file,480,quality);
  while(dataUrl.length>45000 && quality>0.3){ quality-=0.15; dataUrl=await compressImageFile(file,420,quality); }
  if(dataUrl.length>45000){ showToast('Gambar masih terlalu besar, coba foto lain'); return; }
  document.getElementById(hiddenFieldId).value=dataUrl;
  document.getElementById(previewId).src=dataUrl;
  showToast('Gambar siap, jangan lupa klik Simpan');
}

  openModal(editing?'Edit Produk':'Tambah Produk Baru', `
    <form id="productForm" onsubmit="submitProduct(event, ${editing?id:'null'})">
      <div class="field full"><label>Nama Produk</label><input type="text" id="pName" value="${editing?p.name:''}" placeholder="Contoh: Kartu Nama Doff Laminasi" required></div>
      <div class="form-grid">
        <div class="field">
          <label>Kategori</label>
          <select id="pCat" required onchange="document.getElementById('pCatNewWrap').style.display=this.value==='__new'?'block':'none'">
            ${catOptions.map(c=>`<option ${editing&&p.cat===c?'selected':''}>${c}</option>`).join('')}
            <option value="__new">+ Kategori Baru...</option>
          </select>
        </div>
        <div class="field" id="pCatNewWrap" style="display:none"><label>Nama Kategori Baru</label><input type="text" id="pCatNew" placeholder="Nama kategori"></div>
        <div class="field"><label>Satuan</label><select id="pUnit">${UNITS.map(u=>`<option ${editing&&p.unit===u?'selected':''}>${u}</option>`).join('')}</select></div>
        <div class="field"><label>Stok</label><input type="number" id="pStock" min="0" value="${editing?p.stock:0}" required></div>
        <div class="field"><label>Harga Jual (Rp)</label><input type="number" id="pSell" min="0" value="${editing?p.price:''}" placeholder="45000" required></div>
        <div class="field"><label>Harga Modal / HPP (Rp)</label><input type="number" id="pCost" min="0" value="${editing?p.cost:''}" placeholder="27000" required></div>
      </div>
      <div class="field full"><label>Deskripsi Produk</label><textarea id="pDesc" placeholder="Bahan, ukuran, finishing, dll.">${editing?(p.desc||''):''}</textarea></div>
      <div class="field full">
        <label>Gambar Produk</label>
        <div class="img-upload">
          <img id="pImgPreview" class="img-upload-preview" src="${editing&&p.image?p.image:(editing?'https://picsum.photos/seed/'+p.seed+'/120/120':'https://placehold.co/120x120/FAFAF8/D8D2C0?text=%20')}">
          <div class="img-upload-controls">
            <input type="file" id="pImgFile" accept="image/*" onchange="handleImageInput('pImgFile','pImgPreview','pImage')">
            <div class="or">atau tempel URL gambar</div>
            <input type="text" id="pImgUrl" placeholder="https://..." value="${editing&&p.image&&p.image.startsWith('http')?p.image:''}" oninput="document.getElementById('pImgPreview').src=this.value;document.getElementById('pImage').value=this.value">
          </div>
        </div>
        <input type="hidden" id="pImage" value="${editing&&p.image?p.image:''}">
        <div class="hint">Foto otomatis dikompres. Kosongkan kalau ingin pakai gambar contoh bawaan.</div>
      </div>
    </form>
  `, `
    <button class="btn btn-outline" onclick="closeGenericModal()">Batal</button>
    <button class="btn btn-primary" onclick="document.getElementById('productForm').requestSubmit()">${editing?'Simpan Perubahan':'Simpan Produk'}</button>
  `);
}

async function submitProduct(e, editingId){
  e.preventDefault();
  let cat=document.getElementById('pCat').value;
  if(cat==='__new'){
    const nc=document.getElementById('pCatNew').value.trim();
    if(!nc){showToast('Isi nama kategori baru');return;}
    cat=nc; if(!CATEGORIES.includes(nc)) CATEGORIES.push(nc);
  }
  const image = document.getElementById('pImage').value.trim();
  const fields = {
    name:document.getElementById('pName').value.trim(),
    cat, unit:document.getElementById('pUnit').value,
    stock:parseInt(document.getElementById('pStock').value)||0,
    price:parseFloat(document.getElementById('pSell').value)||0,
    cost:parseFloat(document.getElementById('pCost').value)||0,
    desc:document.getElementById('pDesc').value.trim(),
    image,
  };
  if(editingId!==null){
    const idx=products.findIndex(p=>p.id===editingId);
    if(idx>-1) products[idx]={...products[idx], ...fields};
  } else {
    products.push({ id:nextId(), seed:'p'+Math.floor(Math.random()*9999), ...fields });
  }
  await saveKey(KEYS.products, products);
  closeGenericModal();
  renderProductTable();
  showToast(editingId!==null?'Produk diperbarui & tersinkron ke toko':'Produk ditambahkan & tersinkron ke toko');
}
async function deleteProduct(id){
  if(!confirm('Hapus produk ini? Produk juga akan hilang dari halaman toko.'))return;
  products=products.filter(p=>p.id!==id);
  await saveKey(KEYS.products, products);
  renderProductTable();
  showToast('Produk dihapus & tersinkron ke halaman toko');
}

async function viewInvoiceDetail(invNo){
  await loadAll(); // make sure we're matching against the freshest data
  const norm = s => String(s??'').trim();
  const o = orders.find(x=>norm(x.invoiceNo)===norm(invNo));
  if(!o){showToast('Invoice tidak ditemukan');return;}
  const items = sales.filter(s=>norm(s.invoiceNo)===norm(invNo));
  openModal(`Invoice ${invNo}`, `
    <div class="form-grid">
      <div><span class="field-label">Pelanggan</span><p style="margin:4px 0 0;font-size:14px">${o.customerName}<br>${o.phone}<br>${o.address||''}</p></div>
      <div><span class="field-label">Info Pesanan</span><p style="margin:4px 0 0;font-size:14px">${fmtDate(o.date)}<br>${o.paymentMethod}<br>${o.shippingMethod}</p></div>
    </div>
    ${o.note?`<div class="hint" style="margin:10px 0">Catatan: ${o.note}</div>`:''}
    <div class="table-wrap" style="margin-top:14px"><table>
      <thead><tr><th>Produk</th><th class="amt">Qty</th><th class="amt">Harga</th><th class="amt">Subtotal</th></tr></thead>

async function downloadAdminInvoicePDF(invNo){
  const norm = s => String(s??'').trim();
  const o = orders.find(x=>norm(x.invoiceNo)===norm(invNo));
  if(!o){showToast('Invoice tidak ditemukan');return;}
  const items = sales.filter(s=>norm(s.invoiceNo)===norm(invNo));
  showToast('Menyiapkan PDF...');
  const captureEl = document.getElementById('invoiceCaptureArea');
  try{
    await Promise.all([ensureHtml2Canvas(), ensureJsPDF()]);
    if(cachedAdminInvoicePending) await cachedAdminInvoicePending;
    let canvas;
    if(cachedAdminInvoiceForNo===o.invoiceNo && cachedAdminInvoiceBlob){
      const img = await createImageBitmap(cachedAdminInvoiceBlob);
      canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img,0,0);
    } else {
      captureEl.innerHTML = buildAdminInvoiceHtml(o, items);
      canvas = await captureElementAsCanvas(captureEl.firstElementChild, {scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false});
      captureEl.innerHTML='';
    }
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a5' });
    const pageW = pdf.internal.pageSize.getWidth(), pageH = pdf.internal.pageSize.getHeight();
    const margin = 6, maxW = pageW-margin*2, maxH = pageH-margin*2;
    const ratio = canvas.width/canvas.height;
    let imgW = maxW, imgH = maxW/ratio;
    if(imgH > maxH){ imgH = maxH; imgW = maxH*ratio; }
    pdf.addImage(imgData, 'JPEG', (pageW-imgW)/2, (pageH-imgH)/2, imgW, imgH);
    pdf.save(`invoice-${o.invoiceNo}.pdf`);
  }catch(err){
    console.error(err);
    showToast('Gagal membuat PDF ('+(err&&err.message?err.message:'error tak dikenal')+')');
  }
}
let cachedAdminInvoiceBlob = null, cachedAdminInvoiceForNo = null, cachedAdminInvoicePending = null;
/* pre-render the invoice image in the background the moment the modal opens,
   so clicking "Kirim ke WA" a moment later can share it near-instantly —
   calling navigator.share() with no preceding await is what keeps browsers
   from rejecting it as "not a user gesture". */
async function prepareAdminInvoiceImage(o, items){
  cachedAdminInvoiceBlob = null; cachedAdminInvoiceForNo = null;
  cachedAdminInvoicePending = (async()=>{
    try{
      await ensureHtml2Canvas();
      const captureEl = document.getElementById('invoiceCaptureArea');
      captureEl.innerHTML = buildAdminInvoiceHtml(o, items);
      const canvas = await captureElementAsCanvas(captureEl.firstElementChild, {scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false});
      const blob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
      cachedAdminInvoiceBlob = blob; cachedAdminInvoiceForNo = o.invoiceNo;
      captureEl.innerHTML='';
    }catch(e){ console.error('Gagal menyiapkan gambar invoice di latar belakang', e); }
  })();
  return cachedAdminInvoicePending;
}

const numFmtA = n => Math.round(n||0).toLocaleString('id-ID');
/* html2canvas frequently throws when it tries to read cssRules from a
   cross-origin stylesheet (e.g. Google Fonts) — browsers block that for
   security reasons. Detaching those <link> tags just for the capture avoids
   the crash entirely; already-rendered text keeps its font either way. */
async function captureElementAsCanvas(el, opts){
  const links = Array.from(document.querySelectorAll('link[rel="stylesheet"][href^="http"]'))
    .filter(l => { try{ return new URL(l.href).origin !== location.origin; }catch(e){ return false; } });
  const removed = links.map(l => ({ el:l, parent:l.parentNode, next:l.nextSibling }));
  removed.forEach(r => r.el.remove());
  try{
    return await html2canvas(el, opts);
  } finally {
    removed.forEach(r => r.parent.insertBefore(r.el, r.next));
  }
}
async function sendInvoiceToCustomerWA(invNo){
  const norm = s => String(s??'').trim();
  const o = orders.find(x=>norm(x.invoiceNo)===norm(invNo));
  if(!o){showToast('Invoice tidak ditemukan');return;}
  const items = sales.filter(s=>norm(s.invoiceNo)===norm(invNo));
  const itemLines = items.map(it=>{
    const p=productById(it.productId);
    return `- ${it.qty}x ${p?p.name:'(produk dihapus)'} = ${rupiah(it.qty*it.price)}`;
  }).join('\n');
  const bizName = settingVal('biz_name','CETAK.ID');
  const msg = `Halo ${o.customerName}, berikut rincian invoice Anda dari ${bizName}:\n\nNo. Invoice: ${o.invoiceNo}\nTanggal: ${fmtDate(o.date)}\n\n${itemLines}\n\nOngkos Kirim: ${rupiah(o.shippingCost||0)}\nTotal: ${rupiah(o.total)}\nPembayaran: ${o.paymentMethod}\nStatus: ${o.status||'Diproses'}\n\nTerima kasih.`;
  const phone = formatWaPhoneAdmin(o.phone);
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

  // Primary path: image already pre-rendered in the background when the modal
  // opened — share it with virtually no delay so the browser still honors it
  // as a user gesture and opens WhatsApp's share sheet with image + text together.
  if(cachedAdminInvoiceBlob && cachedAdminInvoiceForNo===o.invoiceNo && navigator.canShare){
    const file = new File([cachedAdminInvoiceBlob], `invoice-${o.invoiceNo}.jpg`, {type:'image/jpeg'});
    if(navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], text:msg, title:`Invoice ${o.invoiceNo}`});
        return;
      }catch(err){
        if(err && err.name==='AbortError') return;
        console.warn('navigator.share gagal, pakai cara cadangan', err);
      }
    }
  }

  const waWindow = window.open('', '_blank');

  showToast('Menyiapkan gambar invoice...');
  const captureEl = document.getElementById('invoiceCaptureArea');
  try{
    await ensureHtml2Canvas();
    if(cachedAdminInvoicePending) await cachedAdminInvoicePending;
    let blob = (cachedAdminInvoiceForNo===o.invoiceNo && cachedAdminInvoiceBlob) ? cachedAdminInvoiceBlob : null;
    if(!blob){
      captureEl.innerHTML = buildAdminInvoiceHtml(o, items);
      const canvas = await captureElementAsCanvas(captureEl.firstElementChild, {scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false});
      blob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
    }
    const link=document.createElement('a');
    link.href=URL.createObjectURL(blob);
    link.download=`invoice-${o.invoiceNo}.jpg`;
    document.body.appendChild(link); link.click(); link.remove();
    showToast('Gambar invoice diunduh — lampirkan ke chat WhatsApp yang baru terbuka');
    if(waWindow) waWindow.location.href = waUrl; else window.open(waUrl,'_blank');
  }catch(err){
    console.error(err);
    showToast('Gagal membuat gambar invoice ('+(err&&err.message?err.message:'error tak dikenal')+'), mengirim teks saja');
    if(waWindow) waWindow.location.href = waUrl; else window.open(waUrl,'_blank');
  } finally {
    captureEl.innerHTML='';
  }
}

function mergedCustomers(){
  // manually-added customers (from the customers sheet)
  const manual = customers.map(c=>({...c, sourceType:'manual'}));
  const seenPhones = new Set(manual.map(c=>c.phone));
  // customers derived from past orders (dedup by phone)
  const derivedMap = {};
  orders.forEach(o=>{
    if(!o.phone) return;
    if(!derivedMap[o.phone]) derivedMap[o.phone] = { id:null, name:o.customerName, phone:o.phone, address:o.address, email:'', note:'', sourceType:'derived' };
  });
  const derived = Object.values(derivedMap).filter(d=>!seenPhones.has(d.phone));
  const all = [...manual, ...derived];
  // attach order stats
  return all.map(c=>{
    const cOrders = orders.filter(o=>o.phone===c.phone);
    const totalSpend = cOrders.reduce((s,o)=>s+(parseFloat(o.total)||0),0);
    const lastDate = cOrders.length ? cOrders.map(o=>o.date).sort().slice(-1)[0] : null;
    return { ...c, totalOrders:cOrders.length, totalSpend, lastDate };
  });
}

const JOB_STATUSES = ['Menunggu Dikerjakan','Sedang Diproses','Selesai','Dibatalkan'];
function jobDefaults(invoiceNo){
  return { invoiceNo, targetDate:'', status:'Menunggu Dikerjakan', completedDate:'', assignedTo:'', note:'' };
}
/* every invoice automatically becomes a job — no manual "pull in" step needed.
   The `jobs` sheet only stores the extra production-tracking fields (target
   date, work status, who's on it), merged here with the order it belongs to. */
function mergedJobs(){
  const norm = s => String(s??'').trim();
  return orders.map(o=>{
    const j = jobs.find(x=>norm(x.invoiceNo)===norm(o.invoiceNo)) || jobDefaults(o.invoiceNo);
    return { ...j, invoiceNo:o.invoiceNo, customerName:o.customerName, orderDate:o.date, orderTotal:o.total };
  });
}
function jobReminder(j){
  if(j.status==='Dibatalkan') return { label:'Dibatalkan', cls:'gray' };
  if(j.status==='Selesai'){
    if(!j.targetDate || !j.completedDate) return { label:'Selesai', cls:'green' };
    const onTime = new Date(j.completedDate) <= new Date(j.targetDate);
    return onTime ? { label:'Selesai tepat waktu', cls:'green' } : { label:'Selesai (terlambat)', cls:'orange' };
  }
  if(!j.targetDate) return { label:'Belum ada target', cls:'gray' };
  const today = new Date(); today.setHours(0,0,0,0);
  const t = new Date(j.targetDate); t.setHours(0,0,0,0);
  const diffDays = Math.round((t-today)/86400000);
  if(diffDays<0) return { label:`Terlambat ${Math.abs(diffDays)} hari`, cls:'red' };
  if(diffDays===0) return { label:'Jatuh tempo hari ini', cls:'orange' };
  if(diffDays<=2) return { label:`H-${diffDays}`, cls:'orange' };
  return { label:`H-${diffDays}`, cls:'blue' };
}
function renderPekerjaan(){

  const belum = active.filter(j=>j.status==='Menunggu Dikerjakan').length;

  const selesai = active.filter(j=>j.status==='Selesai').length;

    defaultSort:'_targetSort',
    data: list.map(j=>{
      const r = jobReminder(j);

      {key:'status', label:'Status', render:r=>{
        const cls = r.status==='Selesai'?'green':(r.status==='Sedang Diproses'?'blue':(r.status==='Dibatalkan'?'gray':'orange'));
        return `<span class="pill ${cls}">${r.status}</span>`;
      }},
      {key:'assignedTo', label:'Ditugaskan', render:r=>r.assignedTo||'-'},
      {key:'_reminderLabel', label:'Reminder', sortable:false, render:r=>`<span class="pill ${r._reminderCls}">${r._reminderLabel}</span>`},
      {key:'aksi', label:'', sortable:false, exportSkip:true, render:r=>`<button class="btn-sm btn-outline" onclick='openJobModal(${JSON.stringify(r.invoiceNo)})'>Atur</button>`},
    ],

}
function openJobModal(invoiceNo){
  const list = mergedJobs();
  const j = list.find(x=>x.invoiceNo===invoiceNo) || jobDefaults(invoiceNo);
  openModal(`Atur Pekerjaan — ${invoiceNo}`, `
    <form id="jobForm" onsubmit='submitJob(event, ${JSON.stringify(invoiceNo)})'>
      <div class="field full"><label>Pelanggan</label><input type="text" value="${j.customerName||''}" disabled></div>
      <div class="form-grid">
        <div class="field"><label>Target Tanggal Selesai</label><input type="date" id="jobTarget" value="${j.targetDate||''}"></div>
        <div class="field"><label>Status Pekerjaan</label>
          <select id="jobStatus" onchange="document.getElementById('jobCompletedWrap').style.display=this.value==='Selesai'?'block':'none'">
            ${JOB_STATUSES.map(s=>`<option ${j.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field" id="jobCompletedWrap" style="${j.status==='Selesai'?'':'display:none'}">
          <label>Tanggal Selesai</label>
          <input type="date" id="jobCompleted" value="${j.completedDate||today()}">
        </div>
        <div class="field"><label>Ditugaskan Ke</label><input type="text" id="jobAssigned" value="${j.assignedTo||''}" placeholder="Nama staf/operator"></div>
      </div>
      <div class="field full"><label>Catatan</label><textarea id="jobNote" placeholder="Detail progres, kendala, dll.">${j.note||''}</textarea></div>
    </form>
  `, `
    <button class="btn btn-outline" onclick="closeGenericModal()">Batal</button>
    <button class="btn btn-primary" onclick="document.getElementById('jobForm').requestSubmit()">Simpan</button>
  `);
}
async function submitJob(e, invoiceNo){
  e.preventDefault();
  const norm = s => String(s??'').trim();
  const fields = {
    invoiceNo,
    targetDate: document.getElementById('jobTarget').value,
    status: document.getElementById('jobStatus').value,
    completedDate: document.getElementById('jobStatus').value==='Selesai' ? (document.getElementById('jobCompleted').value||today()) : '',
    assignedTo: document.getElementById('jobAssigned').value.trim(),
    note: document.getElementById('jobNote').value.trim(),
  };
  const idx = jobs.findIndex(j=>norm(j.invoiceNo)===norm(invoiceNo));
  if(idx>-1) jobs[idx]=fields; else jobs.push(fields);
  await saveKey(KEYS.jobs, jobs);
  closeGenericModal();
  renderPekerjaan();
  showToast('Status pekerjaan tersimpan');
}

  const idx=settings.findIndex(s=>s.key===key);
  if(idx>-1) settings[idx].value=value; else settings.push({key,value});

async function saveImageSetting(key, hiddenId){

async function submitInvoiceNumbering(e){
  e.preventDefault();
  upsertSetting('invoice_prefix', document.getElementById('invPrefix').value.trim()||'INV');
  upsertSetting('invoice_counter', String(parseInt(document.getElementById('invCounter').value)||1));
  await saveKey(KEYS.settings, settings);
  showToast('Pengaturan nomor invoice tersimpan');
  renderPembayaran();
}
/* atomic invoice-number generator (kept for potential future use — not
   currently called anywhere since invoices are created only from checkout) */
async function generateInvoiceNumber(){
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'nextInvoiceNumber'}),
    });
    const json = await res.json();
    if(json.ok && json.invoiceNo) return json.invoiceNo;
  }catch(e){ console.error(e); }
  const prefix = settingVal('invoice_prefix','INV');
  const counter = parseInt(settingVal('invoice_counter','1'))||1;
  const d=new Date();
  const dateStr = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const invNo = `${prefix}-${dateStr}-${String(counter).padStart(4,'0')}`;
  upsertSetting('invoice_counter', String(counter+1));
  await saveKey(KEYS.settings, settings);
  return invNo;
}

function openBankModal(id){
  const editing = id!==null;
  const b = editing ? bankAccounts.find(x=>x.id===id) : null;
  openModal(editing?'Edit Rekening':'Tambah Rekening Bank', `
    <form id="bankForm" onsubmit="submitBank(event, ${editing?id:'null'})">
      <div class="field full"><label>Nama Bank</label><input type="text" id="bName" value="${editing?b.bankName:''}" placeholder="Contoh: BCA / Mandiri / BNI" required></div>
      <div class="field full"><label>Nomor Rekening</label><input type="text" id="bNumber" value="${editing?b.accountNumber:''}" placeholder="1234567890" required></div>
      <div class="field full"><label>Atas Nama</label><input type="text" id="bHolder" value="${editing?b.accountHolder:''}" placeholder="Nama pemilik rekening" required></div>
      <div class="toggle-row" style="border:none;padding-top:4px">
        <span style="font-size:14px">Tampilkan di halaman toko</span>
        <label class="switch"><input type="checkbox" id="bActive" ${!editing||b.active?'checked':''}><span class="switch-track"></span></label>
      </div>

  `, `
    <button class="btn btn-outline" onclick="closeGenericModal()">Batal</button>
    <button class="btn btn-primary" onclick="document.getElementById('bankForm').requestSubmit()">${editing?'Simpan Perubahan':'Simpan Rekening'}</button>
  `);
}
async function submitBank(e, editingId){
  e.preventDefault();
  const fields = {
    bankName:document.getElementById('bName').value.trim(),
    accountNumber:document.getElementById('bNumber').value.trim(),
    accountHolder:document.getElementById('bHolder').value.trim(),
    active:document.getElementById('bActive').checked,
  };
  if(editingId!==null){
    const idx=bankAccounts.findIndex(b=>b.id===editingId);
    if(idx>-1) bankAccounts[idx]={...bankAccounts[idx], ...fields};
  } else {
    bankAccounts.push({ id:nextId(), ...fields });
  }
  await saveKey(KEYS.bankaccounts, bankAccounts);
  closeGenericModal();
  renderBankTable();
  showToast('Rekening tersimpan & tersinkron ke toko');
}
async function deleteBank(id){
  if(!confirm('Hapus rekening ini?'))return;
  bankAccounts=bankAccounts.filter(b=>b.id!==id);
  await saveKey(KEYS.bankaccounts, bankAccounts);
  renderBankTable();
  showToast('Rekening dihapus & tersinkron ke toko');
}
async function saveQris(){
  const val=document.getElementById('qrisHidden').value;

  const idx=settings.findIndex(s=>s.key==='qris_image');
  if(idx>-1) settings[idx].value=val; else settings.push({key:'qris_image',value:val});

async function removeQris(){
  if(!confirm('Hapus QRIS ini?'))return;
  const idx=settings.findIndex(s=>s.key==='qris_image');
  if(idx>-1) settings[idx].value='';
  await saveKey(KEYS.settings, settings);
  showToast('QRIS dihapus');
  renderPembayaran();
}

})();
